<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roster — Beme</title>
<link rel="icon" href="favicon.ico" sizes="32x32">
<link rel="icon" href="icon-192.png" type="image/png" sizes="192x192">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.0/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f4f2f8;color:#111;min-height:100vh;padding-bottom:130px;}
.page{background:#fff;max-width:1200px;margin:28px auto;border-radius:16px;padding:36px;box-shadow:0 4px 32px rgba(0,0,0,0.07);}
a{text-decoration:none;}
textarea,input{font-family:'Plus Jakarta Sans',sans-serif;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{display:none;}
input[type=number]{-moz-appearance:textfield;}

#loading-screen{position:fixed;inset:0;background:#f4f2f8;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px;}
.loader-logo img{height:56px;width:auto;}
.loader-spinner{width:36px;height:36px;border:3px solid rgba(178,0,93,0.2);border-top-color:#b2005d;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-size:14px;color:#888;}

.desktop-view{display:block;}
.mobile-view{display:none;}

#summary-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:linear-gradient(135deg,#8a0048,#6a0d9e);
  color:#fff;padding:14px 24px;
  display:flex;align-items:flex-start;gap:20px;
  box-shadow:0 -4px 24px rgba(0,0,0,0.22);
  transition:all 0.3s;opacity:0;transform:translateY(100%);
  z-index:9999;flex-wrap:wrap;
}
#export-btn{
  background:rgba(255,255,255,0.18);border:1.5px solid rgba(255,255,255,0.5);
  color:#fff;padding:10px 18px;border-radius:24px;cursor:pointer;
  font-size:13px;font-weight:700;font-family:inherit;white-space:nowrap;
  flex-shrink:0;align-self:center;transition:background 0.15s;
}
#export-btn:hover{background:rgba(255,255,255,0.28);}

.save-badge{
  position:fixed;top:16px;right:16px;z-index:500;
  background:#1D9E75;color:#fff;font-size:12px;font-weight:700;
  padding:6px 14px;border-radius:20px;opacity:0;transition:opacity 0.3s;
  box-shadow:0 2px 8px rgba(0,0,0,0.15);
}
.save-badge.show{opacity:1;}

@media(max-width:768px){
  body{padding-bottom:150px;}
  .page{margin:0;border-radius:0;padding:16px;}
  .desktop-view{display:none;}
  .mobile-view{display:block;}
  #summary-bar{padding:12px 16px;gap:12px;}
  #export-btn{padding:8px 14px;font-size:12px;}
}
@media(max-width:480px){
  .page{padding:12px;}
  #summary-bar{flex-direction:column;gap:10px;padding:10px 14px;}
  #export-btn{width:100%;text-align:center;}
}
@media print{
  body{background:#fff;padding:0;}
  .page{box-shadow:none;margin:0;border-radius:0;padding:20px;}
  .mobile-view{display:none!important;}
  .desktop-view{display:block!important;}
  #summary-bar,#loading-screen,.save-badge{display:none!important;}
  @page{margin:12mm;size:A4 landscape;}
}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="loader-logo"><img src="assets/brand/logos/Beme1Color.png" alt="Beme"></div>
  <div class="loader-spinner"></div>
  <div class="loader-text" id="load-msg">Cargando roster...</div>
</div>

<div class="save-badge" id="save-badge">✓ Guardado</div>

<div id="app" style="display:none">
  <div class="page" id="page-content"></div>
</div>

<div id="summary-bar">
  <div style="min-width:160px;flex-shrink:0;">
    <div id="sum-count" style="font-weight:800;font-size:15px;"></div>
    <div id="sum-total-wrap" style="display:none;align-items:baseline;gap:5px;margin-top:3px;">
      <span style="font-size:12px;opacity:0.75;">Total:</span>
      <span id="sum-total" style="font-size:19px;font-weight:800;"></span>
    </div>
  </div>
  <div id="sum-list" style="flex:1;min-width:180px;max-height:100px;overflow-y:auto;font-size:12px;"></div>
  <button id="remove-selected-btn" onclick="removeSelectedFromRoster()" style="display:none;padding:10px 18px;border-radius:24px;border:1px solid rgba(255,100,100,0.5);background:rgba(255,60,60,0.15);color:#ff6b6b;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap">🗑 Eliminar del Roster</button>
  <button id="hide-selected-btn" onclick="bulkHideSelected()" style="display:none;padding:10px 18px;border-radius:24px;border:1px solid rgba(239,68,68,0.4);background:rgba(239,68,68,0.1);color:#ef4444;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap">Descartar seleccionados</button>
  <button id="export-btn">↓ Exportar CSV</button>
</div>

<script>
const SUPABASE_URL = 'https://ngstqwbzvnpggpklifat.supabase.co';
const SUPABASE_KEY = 'sb_publishable_1E2K-9D-KzOSVCgROnfa-g_-WCnWCDb';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const FLAG_MAP = {"Argentina":"🇦🇷","Bolivia":"🇧🇴","Brasil":"🇧🇷","Chile":"🇨🇱","Colombia":"🇨🇴","Costa Rica":"🇨🇷","Cuba":"🇨🇺","Ecuador":"🇪🇨","El Salvador":"🇸🇻","España":"🇪🇸","Estados Unidos":"🇺🇸","Guatemala":"🇬🇹","Honduras":"🇭🇳","México":"🇲🇽","Nicaragua":"🇳🇮","Panamá":"🇵🇦","Paraguay":"🇵🇾","Perú":"🇵🇪","Puerto Rico":"🇵🇷","República Dominicana":"🇩🇴","Uruguay":"🇺🇾","Venezuela":"🇻🇪"};

let ROSTER = null;
let TALENTS = [];
let SELS = {}; // talent_id → {selected, accion, precio, contraoferta}
let LINK_ID = 0; // 0 = legacy direct token, >0 = roster_links.id
let CLIENT_NAME = '';
var COMPACT_MODE = new URLSearchParams(window.location.search).get('compact') === '1';
// Persist view/sort preferences per roster in localStorage
function _rosterPrefKey() { return 'roster_prefs_' + (new URLSearchParams(window.location.search).get('link') || new URLSearchParams(window.location.search).get('token') || ''); }
function _loadRosterPrefs() { try { return JSON.parse(localStorage.getItem(_rosterPrefKey())) || {}; } catch(e) { return {}; } }
function _saveRosterPrefs(prefs) { try { localStorage.setItem(_rosterPrefKey(), JSON.stringify(prefs)); } catch(e) {} }
var _prefs = _loadRosterPrefs();
let rosterViewMode = _prefs.view || 'table';
let rosterSort = _prefs.sort || 'ig-desc';
let showAI = null; // null = use ROSTER.show_ai_descriptions
let IS_INTERNAL = false; // admin or campaign_manager
let DISPLAY_TITLE = '';

// ── Helpers ──────────────────────────────────────────────────
function fmtF(n){if(!n||n===0)return'—';if(n>=1e6)return(n/1e6).toFixed(1).replace('.0','')+'M';if(n>=1000)return Math.floor(n/1000)+'K';return String(n);}
function ini(name){return name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();}
function extractH(url){if(!url)return'';const m=url.match(/@([^/?#&]+)/);if(m)return'@'+m[1];let u=url.replace(/https?:\/\/(www\.)?(tiktok\.com|instagram\.com|youtube\.com)\/?/i,'').split(/[/?#&]/)[0];u=u.replace(/^@/,'');return u?'@'+u:url;}
function countries(t){return(t.paises||[t.pais||'']).filter(Boolean).map(c=>(FLAG_MAP[c]||'')+' '+c);}

// ── Init ─────────────────────────────────────────────────────
async function init() {
  const params = new URLSearchParams(window.location.search);
  const linkToken = params.get('link');
  const legacyToken = params.get('token');
  if (!linkToken && !legacyToken) { showError('URL inválida — falta el token del roster.'); return; }

  try {
    document.getElementById('load-msg').textContent = 'Cargando roster...';

    // Check if user is logged in (internal team)
    try {
      const {data:{session}} = await sb.auth.getSession();
      if (session) {
        const {data:profile} = await sb.from('user_profiles').select('role').eq('id', session.user.id).single();
        if (profile && ['admin','campaign_manager'].includes(profile.role)) IS_INTERNAL = true;
      }
    } catch(e) {}

    // Resolve roster: via roster_links (?link=) or legacy (?token=)
    if (linkToken) {
      const { data: link, error: lErr } = await sb.from('roster_links').select('*').eq('token', linkToken).single();
      if (lErr || !link) { showError('Link no encontrado. Verificá la URL.'); return; }
      LINK_ID = link.id;
      CLIENT_NAME = link.client_name || '';
      var LINK_ROSTER_TITLE = link.roster_title || '';
      if (link.compact) {
        // Override compact mode from link setting
        Object.defineProperty(window, 'COMPACT_MODE_OVERRIDE', { value: true });
      }
      const { data: roster, error: rErr } = await sb.from('rosters').select('*').eq('id', link.roster_id).single();
      if (rErr || !roster) { showError('Roster no encontrado.'); return; }
      ROSTER = roster;
    } else {
      const { data: roster, error: rErr } = await sb.from('rosters').select('*').eq('public_token', legacyToken).single();
      if (rErr || !roster) { showError('Roster no encontrado. Verificá el link.'); return; }
      ROSTER = roster;
      LINK_ID = 0;
    }

    // Override compact from link setting
    if (window.COMPACT_MODE_OVERRIDE) COMPACT_MODE = true;

    DISPLAY_TITLE = (typeof LINK_ROSTER_TITLE !== 'undefined' && LINK_ROSTER_TITLE) ? LINK_ROSTER_TITLE : ROSTER.name;
    document.title = 'Roster — ' + DISPLAY_TITLE + (CLIENT_NAME ? ' — ' + CLIENT_NAME : '');

    const talentIds = (ROSTER.talent_ids || []).map(id => parseInt(id)).filter(Boolean);
    document.getElementById('load-msg').textContent = 'Cargando talentos...';

    // Load talents and selections in parallel
    const selQuery = sb.from('roster_selecciones').select('*').eq('roster_id', ROSTER.id).eq('link_id', LINK_ID);
    const [talentsRes, selRes] = await Promise.all([
      talentIds.length > 0
        ? sb.from('talentos').select('id,nombre,paises,ciudad,tiktok,instagram,youtube,categorias,seguidores,genero,keywords').in('id', talentIds)
        : {data:[]},
      selQuery,
    ]);

    // Preserve order from talent_ids
    TALENTS = talentIds.map(id => (talentsRes.data || []).find(t => t.id === id)).filter(Boolean);
    (selRes.data || []).forEach(s => { SELS[s.talent_id] = s; });

    // Load photos in background after render (they're heavy, especially base64)
    setTimeout(async () => {
      if (!talentIds.length) return;
      const {data: photoData} = await sb.from('talentos').select('id,foto').in('id', talentIds);
      if (photoData) {
        photoData.forEach(p => {
          const t = TALENTS.find(x => x.id === p.id);
          if (t && p.foto) {
            t.foto = p.foto;
            // Update visible avatars
            document.querySelectorAll(`[data-avatar-id="${p.id}"]`).forEach(el => {
              if (p.foto.startsWith('data:') || p.foto.startsWith('https://')) {
                el.innerHTML = `<img src="${p.foto}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
              }
            });
          }
        });
      }
    }, 100);

    render();
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    restoreSelections();
    updateSummary();
  } catch(e) {
    showError('Error: ' + e.message);
  }
}

function showError(msg) {
  document.getElementById('load-msg').textContent = msg;
  document.querySelector('.loader-spinner').style.display = 'none';
}

// ── Render ────────────────────────────────────────────────────
function setRosterView(mode) {
  rosterViewMode = mode;
  _saveRosterPrefs({ view: rosterViewMode, sort: rosterSort });
  render();
  restoreSelections();
}
function setRosterSort(sort) {
  rosterSort = sort;
  _saveRosterPrefs({ view: rosterViewMode, sort: rosterSort });
  render();
  restoreSelections();
}
function applySortToTalents(talents) {
  if (rosterSort === 'default') return talents;
  return [...talents].sort(function(a, b) {
    var aS = a.seguidores || {};
    var bS = b.seguidores || {};
    if (rosterSort === 'ig-desc') return (bS.instagram||0) - (aS.instagram||0);
    if (rosterSort === 'ig-asc') return (aS.instagram||0) - (bS.instagram||0);
    if (rosterSort === 'tt-desc') return (bS.tiktok||0) - (aS.tiktok||0);
    if (rosterSort === 'tt-asc') return (aS.tiktok||0) - (bS.tiktok||0);
    return 0;
  });
}
function toggleAIView(show) {
  showAI = show;
  render();
  restoreSelections();
}

let showHidden = false; // toggle to reveal hidden talents

function render() {
  const showTT = ROSTER.platforms?.tt !== false;
  const showIG = ROSTER.platforms?.ig !== false;
  const showYT = ROSTER.platforms?.yt !== false;
  const showPriceComments = !COMPACT_MODE;
  // Filter out hidden talents (per link_id) unless showHidden is on or IS_INTERNAL
  const hiddenIds = new Set();
  Object.keys(SELS).forEach(function(id) { if (SELS[id].hidden) hiddenIds.add(parseInt(id)); });
  const visibleTalents = (showHidden || IS_INTERNAL) ? TALENTS : TALENTS.filter(function(t) { return !hiddenIds.has(t.id); });
  const today = new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'long',year:'numeric'});
  const hasAIDescs = ROSTER.ai_descriptions && Object.keys(ROSTER.ai_descriptions).length > 0;
  const aiVisible = showAI !== null ? showAI : (ROSTER.show_ai_descriptions && hasAIDescs);

  const ttSVG  = '<svg width="13" height="13" viewBox="0 0 24 24" fill="#ff0050"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34l-.04-8.68a8.25 8.25 0 004.82 1.55V4.72a4.85 4.85 0 01-1.01-.03z"/></svg>';
  const igSVG  = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#e1306c" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/></svg>';
  const ytSVG  = '<svg width="13" height="13" viewBox="0 0 24 24" fill="#ff0000"><path d="M23.5 6.19a3.02 3.02 0 0 0-2.12-2.14C19.54 3.5 12 3.5 12 3.5s-7.54 0-9.38.55A3.02 3.02 0 0 0 .5 6.19C0 8.04 0 12 0 12s0 3.96.5 5.81a3.02 3.02 0 0 0 2.12 2.14C4.46 20.5 12 20.5 12 20.5s7.54 0 9.38-.55a3.02 3.02 0 0 0 2.12-2.14C24 15.96 24 12 24 12s0-3.96-.5-5.81zM9.75 15.52V8.48L15.5 12l-5.75 3.52z"/></svg>';

  // Desktop table rows
  const thStyle = 'padding:12px 14px;text-align:left;color:#fff;font-size:12px;font-weight:700;letter-spacing:0.5px;';
  const tableHeader = `<tr style="background:linear-gradient(135deg,#b2005d,#9414E0);">
    <th style="${thStyle}width:52px;text-align:center;"></th>
    <th style="${thStyle}">Talento</th><th style="${thStyle}">País</th>
    ${showTT?`<th style="${thStyle}">TikTok</th>`:''}
    ${showIG?`<th style="${thStyle}">Instagram</th>`:''}
    ${showYT?`<th style="${thStyle}">YouTube</th>`:''}
    <th style="${thStyle}">Categorías</th>
    ${showPriceComments ? `<th style="${thStyle}">Acciones</th>` : ''}
    ${showPriceComments ? `<th style="${thStyle}">Precio</th>` : ''}
    ${showPriceComments ? `<th style="${thStyle}">Comentarios</th>` : ''}
    ${showPriceComments && IS_INTERNAL ? `<th style="${thStyle}background:rgba(0,0,0,0.15)">Precio Int.</th>` : ''}
    ${showPriceComments && IS_INTERNAL ? `<th style="${thStyle}background:rgba(0,0,0,0.15)">Notas Int.</th>` : ''}
    ${showPriceComments ? `<th style="${thStyle}">Contraoferta</th>` : ''}
  </tr>`;

  const sortedTalents = applySortToTalents(visibleTalents);
  const tableRows = sortedTalents.map((t, i) => {
    const av = `<span data-avatar-id="${t.id}" style="display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;background:#f0e0e8;color:#b2005d;font-weight:800;font-size:13px;margin-right:8px;flex-shrink:0;overflow:hidden">${t.foto ? `<img src="${t.foto}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">` : ini(t.nombre)}</span>`;
    const ctries = countries(t).join('<br>');
    const ttCell = !showTT?'':t.tiktok?`<div style="display:flex;align-items:center;gap:4px;">${ttSVG}<a href="${t.tiktok}" target="_blank" style="color:#ff0050;font-size:12px;font-weight:600;">${extractH(t.tiktok)}</a></div><div style="font-size:11px;color:#777;padding-left:15px;">${fmtF(t.seguidores?.tiktok)}</div>`:'<span style="color:#ccc;">—</span>';
    const igCell = !showIG?'':t.instagram?`<div style="display:flex;align-items:center;gap:4px;">${igSVG}<a href="${t.instagram}" target="_blank" style="color:#e1306c;font-size:12px;font-weight:600;">${extractH(t.instagram)}</a></div><div style="font-size:11px;color:#777;padding-left:15px;">${fmtF(t.seguidores?.instagram)}</div>`:'<span style="color:#ccc;">—</span>';
    const ytCell = !showYT?'':t.youtube?`<div style="display:flex;align-items:center;gap:4px;">${ytSVG}<a href="${t.youtube}" target="_blank" style="color:#cc0000;font-size:12px;font-weight:600;">${extractH(t.youtube)}</a></div><div style="font-size:11px;color:#777;padding-left:15px;">${fmtF(t.seguidores?.youtube)}</div>`:'<span style="color:#ccc;">—</span>';
    const cats = (t.categorias||[]).slice(0,4).map(c=>`<span style="background:#f5f0f8;color:#7a3fa0;font-size:10px;padding:2px 7px;border-radius:10px;display:inline-block;margin:1px;">${c}</span>`).join('');
    const rowBg = i%2===0?'#fff':'#faf9fc';
    return `<tr id="row_${t.id}" style="background:${rowBg};transition:background 0.15s,box-shadow 0.15s;">
      <td style="padding:12px 14px;border-bottom:1px solid #f0f0f0;vertical-align:middle;text-align:center;width:52px;">
        <input type="checkbox" class="row-check" data-id="${t.id}" style="width:20px;height:20px;accent-color:#b2005d;cursor:pointer;display:block;margin:auto;">
      </td>
      <td style="padding:10px 14px;border-bottom:1px solid #f0f0f0;vertical-align:middle;">
        <div style="display:flex;align-items:center;">${av}<div><div style="font-weight:700;font-size:13px;color:#111;">${t.nombre}</div>${t.ciudad?`<div style="font-size:11px;color:#888;">${t.ciudad}</div>`:''}</div></div>
      </td>
      <td style="padding:10px 14px;border-bottom:1px solid #f0f0f0;vertical-align:middle;font-size:12px;color:#444;line-height:1.7;">${ctries}</td>
      ${showTT?`<td style="padding:10px 14px;border-bottom:1px solid #f0f0f0;vertical-align:middle;">${ttCell}</td>`:''}
      ${showIG?`<td style="padding:10px 14px;border-bottom:1px solid #f0f0f0;vertical-align:middle;">${igCell}</td>`:''}
      ${showYT?`<td style="padding:10px 14px;border-bottom:1px solid #f0f0f0;vertical-align:middle;">${ytCell}</td>`:''}
      <td style="padding:10px 14px;border-bottom:1px solid #f0f0f0;vertical-align:middle;"><div style="display:flex;flex-wrap:wrap;gap:2px;">${cats}</div></td>
      ${showPriceComments ? `<td style="padding:10px 14px;border-bottom:1px solid #f0f0f0;vertical-align:middle;min-width:155px;">
        <textarea class="accion-input" data-id="${t.id}" placeholder="Ej. Post + story..."
          style="width:100%;min-height:52px;border:1px solid #e0e0e0;border-radius:6px;padding:6px 8px;font-size:12px;font-family:inherit;color:#111;outline:none;resize:vertical;"></textarea>
      </td>` : ''}
      ${showPriceComments ? `<td style="padding:10px 14px;border-bottom:1px solid #f0f0f0;vertical-align:middle;width:120px;">
        <div style="display:flex;align-items:center;gap:4px;">
          <span style="font-size:14px;color:#b2005d;font-weight:700;">$</span>
          <input type="text" inputmode="numeric" pattern="[0-9]*" class="price-input" data-id="${t.id}" placeholder="0"
            style="width:80px;border:1px solid #e0e0e0;border-radius:6px;padding:6px 8px;font-size:13px;font-family:inherit;color:#111;outline:none;${IS_INTERNAL?'':'background:#f8f8f8;color:#888'}" ${IS_INTERNAL?'':'readonly'}>
        </div>
      </td>` : ''}
      ${showPriceComments ? `<td style="padding:10px 14px;border-bottom:1px solid #f0f0f0;vertical-align:middle;min-width:160px;">
        <textarea class="counter-input" data-id="${t.id}" placeholder="Comentarios..."
          style="width:100%;min-height:52px;border:1px solid #e0e0e0;border-radius:6px;padding:6px 8px;font-size:12px;font-family:inherit;color:#111;outline:none;resize:vertical;line-height:1.4;"></textarea>
      </td>` : ''}
      ${showPriceComments && IS_INTERNAL ? `<td style="padding:10px 14px;border-bottom:1px solid #f0f0f0;vertical-align:middle;width:120px;background:rgba(148,20,224,0.02)">
        <input type="text" class="admin-precio-input" data-id="${t.id}" placeholder="Precio real"
          style="width:90px;border:1px solid #d0c0e0;border-radius:6px;padding:6px 8px;font-size:12px;font-family:inherit;color:#9414E0;outline:none;font-weight:600">
      </td>` : ''}

// ── Restore previous selections ───────────────────────────────
function restoreSelections() {
  Object.entries(SELS).forEach(([tid, sel]) => {
    const id = parseInt(tid);
    // Checkboxes
    document.querySelectorAll(`.row-check[data-id="${id}"]`).forEach(chk => {
      chk.checked = sel.selected;
      highlightRow(chk);
    });
    // Inputs
    document.querySelectorAll(`.accion-input[data-id="${id}"]`).forEach(el => { if(sel.accion) el.value = sel.accion; });
    document.querySelectorAll(`.price-input[data-id="${id}"]`).forEach(el => { if(sel.precio) el.value = sel.precio; });
    document.querySelectorAll(`.contra-input[data-id="${id}"]`).forEach(el => { if(sel.contraoferta) el.value = sel.contraoferta; });
    document.querySelectorAll(`.admin-precio-input[data-id="${id}"]`).forEach(el => { if(sel.admin_precio) el.value = sel.admin_precio; });
    document.querySelectorAll(`.admin-notes-input[data-id="${id}"]`).forEach(el => { if(sel.admin_notes) el.value = sel.admin_notes; });
    document.querySelectorAll(`.allow-co-check[data-id="${id}"]`).forEach(el => { el.checked = !!sel.allow_counteroffer; });
    document.querySelectorAll(`.counter-input[data-id="${id}"]`).forEach(el => { if(sel.contraoferta) el.value = sel.contraoferta; });
  });
}

// ── Highlight row ─────────────────────────────────────────────
function highlightRow(checkbox) {
  const id = checkbox.getAttribute('data-id');
  const row = document.getElementById('row_' + id);
  if (row) { row.style.background = checkbox.checked ? '#fff5f9' : ''; row.style.boxShadow = checkbox.checked ? 'inset 3px 0 0 #b2005d' : ''; }
  const card = document.getElementById('mob_' + id);
  if (card) card.style.boxShadow = checkbox.checked ? '0 4px 20px rgba(178,0,93,0.18),inset 0 0 0 2px #b2005d' : '0 2px 12px rgba(0,0,0,0.07)';
  document.querySelectorAll(`.row-check[data-id="${id}"]`).forEach(c => { c.checked = checkbox.checked; });
}

// ── Remove talents from roster (permanently, admin only) ─────
async function removeSelectedFromRoster() {
  const checked = document.querySelectorAll('.row-check:checked');
  const seen = {}; const ids = [];
  checked.forEach(c => { const id = c.getAttribute('data-id'); if(!seen[id]){seen[id]=true;ids.push(parseInt(id));} });
  if (!ids.length) return;
  const names = ids.map(id => { const t = TALENTS.find(x => String(x.id)===String(id)); return t ? t.nombre : id; });
  if (!confirm(`¿Eliminar ${ids.length} talento${ids.length!==1?'s':''} del roster definitivamente?\n\n${names.join(', ')}\n\nEsta acción no se puede deshacer.`)) return;

  try {
    // Remove from talent_ids array
    const newIds = (ROSTER.talent_ids||[]).map(id=>parseInt(id)).filter(id => !ids.includes(id));
    await sb.from('rosters').update({talent_ids: newIds}).eq('id', ROSTER.id);
    // Remove ALL selections for these talents (across all links)
    for (const id of ids) {
      await sb.from('roster_selecciones').delete().eq('roster_id', ROSTER.id).eq('talent_id', id);
      delete SELS[id];
    }
    ROSTER.talent_ids = newIds;
    TALENTS = TALENTS.filter(t => !ids.includes(t.id));
    render();
    restoreSelections();
    updateSummary();
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

// ── Remove single talent from roster (admin only) ────────────
async function confirmRemoveFromRoster(talentId) {
  var id = parseInt(talentId);
  var t = TALENTS.find(function(x){return x.id===id;});
  var nombre = t ? t.nombre : 'este talento';
  if (!confirm('¿Eliminar a ' + nombre + ' del roster definitivamente?\n\nEsta acción no se puede deshacer.')) return;
  try {
    var newIds = (ROSTER.talent_ids||[]).map(function(x){return parseInt(x);}).filter(function(x){return x!==id;});
    await sb.from('rosters').update({talent_ids: newIds}).eq('id', ROSTER.id);
    await sb.from('roster_selecciones').delete().eq('roster_id', ROSTER.id).eq('talent_id', id);
    delete SELS[id];
    ROSTER.talent_ids = newIds;
    TALENTS = TALENTS.filter(function(x){return x.id!==id;});
    render();
    restoreSelections();
    updateSummary();
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

// ── Save to Supabase (debounced) ──────────────────────────────
let _saveTimers = {};
function queueSave(talentId) {
  clearTimeout(_saveTimers[talentId]);
  _saveTimers[talentId] = setTimeout(() => saveSelection(talentId), 900);
}

async function saveSelection(talentId) {
  const id = parseInt(talentId);
  const chk = document.querySelector(`.row-check[data-id="${id}"]`);
  const accionEl = document.querySelector(`.accion-input[data-id="${id}"]`);
  const priceEl = document.querySelector(`.price-input[data-id="${id}"]`);
  const counterEl = document.querySelector(`.counter-input[data-id="${id}"]`);

  const contraEl = document.querySelector(`.contra-input[data-id="${id}"]`);
  const adminPrecioEl = document.querySelector(`.admin-precio-input[data-id="${id}"]`);
  const adminNotesEl = document.querySelector(`.admin-notes-input[data-id="${id}"]`);
  const allowCoEl = document.querySelector(`.allow-co-check[data-id="${id}"]`);

  const row = {
    roster_id: ROSTER.id,
    talent_id: id,
    link_id: LINK_ID,
    selected: chk ? chk.checked : false,
    accion: accionEl ? accionEl.value.trim() : '',
    precio: priceEl && priceEl.value ? parseFloat(priceEl.value.replace(/[^0-9.]/g, '')) || null : null,
    contraoferta: counterEl ? counterEl.value.trim() : '',
    allow_counteroffer: allowCoEl ? allowCoEl.checked : (SELS[id]?.allow_counteroffer || false),
    admin_precio: adminPrecioEl ? adminPrecioEl.value.trim() : (SELS[id]?.admin_precio || ''),
    admin_notes: adminNotesEl ? adminNotesEl.value.trim() : (SELS[id]?.admin_notes || ''),
    updated_at: new Date().toISOString()
  };
  if (contraEl) row.contraoferta = contraEl.value.trim();
  // Track who edited: brand edits trigger notification for admin
  if (!IS_INTERNAL) {
    row.last_brand_edit = new Date().toISOString();
  }
  SELS[id] = row;

  const badge = document.getElementById('save-badge');
  try {
    await sb.from('roster_selecciones').upsert(row, { onConflict: 'roster_id,talent_id,link_id' });
    badge.textContent = '✓ Guardado';
    badge.style.background = '#1D9E75';
  } catch(e) {
    badge.textContent = '✗ Error al guardar';
    badge.style.background = '#cc0000';
  }
  badge.classList.add('show');
  setTimeout(() => badge.classList.remove('show'), 2000);
}

// ── Summary bar ───────────────────────────────────────────────
function confirmHideTalent(talentId) {
  var t = TALENTS.find(function(x){return x.id===parseInt(talentId);});
  var nombre = t ? t.nombre : 'este talento';
  if (confirm('Descartar a ' + nombre + '?')) {
    setHideTalent(talentId, true);
  }
}

async function toggleHideTalent(talentId) {
  var id = parseInt(talentId);
  var isHidden = SELS[id] && SELS[id].hidden;
  setHideTalent(id, !isHidden);
}

async function setHideTalent(talentId, hidden) {
  var id = parseInt(talentId);
  var sel = SELS[id] || { roster_id: ROSTER.id, talent_id: id, link_id: LINK_ID, selected: false };
  sel.hidden = hidden;
  sel.link_id = LINK_ID;
  sel.roster_id = ROSTER.id;
  sel.talent_id = id;
  sel.updated_at = new Date().toISOString();
  SELS[id] = sel;
  try {
    await sb.from('roster_selecciones').upsert(sel, { onConflict: 'roster_id,talent_id,link_id' });
  } catch(e) { console.warn('hide error:', e); }
  render();
  restoreSelections();
}

function bulkHideSelected() {
  var checked = document.querySelectorAll('.row-check:checked');
  var ids = [];
  checked.forEach(function(c) { var id = parseInt(c.getAttribute('data-id')); if (ids.indexOf(id) === -1) ids.push(id); });
  if (!ids.length) return;
  var names = ids.map(function(id) { var t = TALENTS.find(function(x){return x.id===id;}); return t ? t.nombre : id; });
  if (!confirm('Descartar ' + ids.length + ' talento' + (ids.length!==1?'s':'') + '?\n\n' + names.join(', '))) return;
  ids.forEach(function(id) { setHideTalent(id, true); });
}

function updateSummary() {
  const checked = document.querySelectorAll('.row-check:checked');
  const seen = {}; const unique = [];
  checked.forEach(c => { const id = c.getAttribute('data-id'); if(!seen[id]){ seen[id]=true; unique.push(id); } });

  const bar = document.getElementById('summary-bar');
  if (!unique.length) { bar.style.opacity='0'; bar.style.transform='translateY(100%)'; return; }
  bar.style.opacity='1'; bar.style.transform='translateY(0)';

  let total=0, hasPrice=false, html='';
  unique.forEach(id => {
    const t = TALENTS.find(x => String(x.id)===String(id));
    if (!t) return;
    const p = parseFloat(document.querySelector(`.price-input[data-id="${id}"]`)?.value)||0;
    const co = (document.querySelector(`.counter-input[data-id="${id}"]`)?.value||'').trim();
    const a = document.querySelector(`.accion-input[data-id="${id}"]`)?.value.trim()||'';
    if(p>0) hasPrice=true;
    total+=p;
    html+='<div style="display:flex;align-items:flex-start;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.1);gap:12px;">'
      +'<div><div style="font-weight:700;font-size:13px;">'+t.nombre+'</div>'+(a?'<div style="font-size:11px;opacity:0.7;margin-top:1px;">'+a+'</div>':'')+(co?'<div style="font-size:10px;opacity:0.6;margin-top:2px;font-style:italic;">'+co+'</div>':'')+'</div>'
      +'<div style="text-align:right;flex-shrink:0;">'
      +(p>0?'<div style="font-size:12px;font-weight:700;">$ '+p.toLocaleString('es-ES')+'</div>':'<span style="font-size:12px;opacity:0.4;">Sin precio</span>')
      +'</div></div>';
  });

  document.getElementById('sum-count').textContent = unique.length+' talento'+(unique.length!==1?'s':'')+' seleccionado'+(unique.length!==1?'s':'');
  const tw = document.getElementById('sum-total-wrap');
  if(hasPrice){ document.getElementById('sum-total').textContent='$ '+total.toLocaleString('es-ES'); tw.style.display='flex'; } else tw.style.display='none';
  document.getElementById('sum-list').innerHTML = html;
  // Show remove button (admin only, works in all modes including compact)
  const removeBtn = document.getElementById('remove-selected-btn');
  if (removeBtn) removeBtn.style.display = (unique.length && IS_INTERNAL) ? 'block' : 'none';
  // Show hide button for link-based rosters
  const hideBtn = document.getElementById('hide-selected-btn');
  if (hideBtn) hideBtn.style.display = (unique.length && LINK_ID > 0) ? 'block' : 'none';
}

// ── Event delegation ──────────────────────────────────────────
document.addEventListener('change', e => {
  if (e.target.classList.contains('row-check')) {
    highlightRow(e.target);
    queueSave(e.target.getAttribute('data-id'));
    updateSummary();
  }
});
document.addEventListener('change', e => {
  if (e.target.classList.contains('allow-co-check')) {
    queueSave(e.target.getAttribute('data-id'));
  }
});
document.addEventListener('input', e => {
  const saveable = ['price-input','accion-input','counter-input','contra-input','admin-precio-input','admin-notes-input'];
  if (saveable.some(cls => e.target.classList.contains(cls))) {
    if(e.target.classList.contains('price-input')) {
      const cleaned = e.target.value.replace(/[^0-9.]/g, '').replace(/(\..*)\./g, '$1');
      if(cleaned !== e.target.value) e.target.value = cleaned;
    }
    const id = e.target.getAttribute('data-id');
    // Sync same-class inputs across views
    const cls = saveable.find(c => e.target.classList.contains(c));
    if (cls) document.querySelectorAll('.'+cls+'[data-id="'+id+'"]').forEach(el => { if(el!==e.target) el.value=e.target.value; });
    queueSave(id);
    updateSummary();
  }
});
document.addEventListener('focusin', e => {
  if (e.target.classList.contains('price-input') || e.target.classList.contains('accion-input')) e.target.style.borderColor='#b2005d';
  if (e.target.classList.contains('counter-input')) e.target.style.borderColor='#9414E0';
});
document.addEventListener('focusout', e => {
  if (e.target.classList.contains('price-input') || e.target.classList.contains('accion-input')) e.target.style.borderColor='#e0e0e0';
  if (e.target.classList.contains('counter-input')) e.target.style.borderColor='#e8d8ff';
});

// ── Export CSV ────────────────────────────────────────────────
document.getElementById('export-btn').addEventListener('click', () => {
  const checked = document.querySelectorAll('.row-check:checked');
  const seen={}; const ids=[];
  checked.forEach(c => { const id=c.getAttribute('data-id'); if(!seen[id]){seen[id]=true;ids.push(id);} });
  if (!ids.length) { alert('Seleccioná al menos un talento primero.'); return; }
  const lines = [COMPACT_MODE
    ? 'Talento,País,TikTok,Instagram,YouTube,Acciones'
    : 'Talento,País,TikTok,Instagram,YouTube,Acciones,Precio,Contraoferta'];
  ids.forEach(id => {
    const t = TALENTS.find(x => String(x.id)===String(id));
    if (!t) return;
    const p = document.querySelector(`.price-input[data-id="${id}"]`)?.value||'';
    const co = document.querySelector(`.counter-input[data-id="${id}"]`)?.value||'';
    const a = document.querySelector(`.accion-input[data-id="${id}"]`)?.value.trim()||'';
    const paises = (t.paises||[]).filter(Boolean).join(';');
    const baseCols = ['"'+t.nombre.replace(/"/g,'""')+'"','"'+paises+'"',
      t.tiktok?'"'+t.tiktok+'"':'""', t.instagram?'"'+t.instagram+'"':'""',
      t.youtube?'"'+t.youtube+'"':'""', '"'+a.replace(/"/g,'""')+'"'];
    lines.push(COMPACT_MODE ? baseCols.join(',') : [...baseCols, p, co].join(','));
  });
  const blob = new Blob(['\uFEFF'+lines.join('\n')],{type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='seleccion.csv'; a.click(); URL.revokeObjectURL(url);
});

init();
</script>
</body>
