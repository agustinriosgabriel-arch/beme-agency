<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roster — Beme</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.0/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f4f2f8;color:#111;min-height:100vh;}
a{text-decoration:none;}

#loading-screen{position:fixed;inset:0;background:#f4f2f8;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px;}
.loader-logo{font-size:32px;font-weight:300;}
.loader-logo strong{font-weight:800;color:#9414E0;}
.loader-spinner{width:36px;height:36px;border:3px solid rgba(148,20,224,0.2);border-top-color:#9414E0;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-size:14px;color:#888;}

.page{background:#fff;max-width:1200px;margin:28px auto;border-radius:16px;padding:36px;box-shadow:0 4px 32px rgba(0,0,0,0.07);}
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:3px solid #9414E0;flex-wrap:wrap;gap:12px;}
.logo{font-size:24px;font-weight:300;}
.logo strong{font-weight:800;background:linear-gradient(135deg,#b2005d,#9414E0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.roster-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:#111;margin-top:4px;}
.roster-desc{font-size:13px;color:#666;margin-top:4px;max-width:600px;}
.header-right{text-align:right;}
.stat-line{font-size:12px;color:#888;line-height:1.8;}
.stat-line strong{color:#111;}

/* Filters bar */
.filters-bar{
  display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px;
  padding:16px;background:#faf8fd;border:1px solid #ece5f5;border-radius:12px;
  align-items:center;
}
.filter-label{font-size:11px;font-weight:700;color:#9414E0;letter-spacing:0.5px;text-transform:uppercase;margin-right:4px;}
.filter-select{
  padding:7px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;
  font-family:inherit;background:#fff;color:#111;outline:none;cursor:pointer;
  min-width:140px;
}
.filter-select:focus{border-color:#9414E0;}
.filter-input{
  padding:7px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;
  font-family:inherit;background:#fff;color:#111;outline:none;flex:1;min-width:180px;
}
.filter-input:focus{border-color:#9414E0;}
.filter-input::placeholder{color:#bbb;}
.filter-seg-group{display:flex;align-items:center;gap:6px;}
.filter-seg-input{width:90px;padding:7px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;outline:none;}
.filter-seg-input:focus{border-color:#9414E0;}
.filter-clear{
  background:none;border:1px solid #ddd;border-radius:8px;padding:7px 14px;
  font-size:12px;font-weight:600;color:#9414E0;cursor:pointer;font-family:inherit;
}
.filter-clear:hover{background:#f5f0fa;}

/* Table */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;box-shadow:0 2px 16px rgba(0,0,0,0.06);}
thead tr{background:linear-gradient(135deg,#9414E0,#4c6ef5);}
th{padding:12px 14px;text-align:left;color:#fff;font-size:12px;font-weight:700;letter-spacing:0.5px;}
td{padding:10px 14px;border-bottom:1px solid #f0f0f0;vertical-align:middle;}
tr:nth-child(even){background:#faf9fc;}
.avatar{width:38px;height:38px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.avatar-placeholder{
  display:inline-flex;align-items:center;justify-content:center;
  width:38px;height:38px;border-radius:50%;background:#f0e0f5;
  color:#9414E0;font-weight:800;font-size:13px;flex-shrink:0;
}
.talent-name{font-weight:700;font-size:13px;color:#111;}
.talent-city{font-size:11px;color:#888;}
.net-link{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:600;}
.net-followers{font-size:11px;color:#777;padding-left:15px;}
.cat-tag{background:#f5f0f8;color:#7a3fa0;font-size:10px;padding:2px 7px;border-radius:10px;display:inline-block;margin:1px;}
.empty-msg{text-align:center;color:#999;padding:60px 20px;font-size:14px;}
.count-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.count-text{font-size:13px;color:#888;}

/* Mobile */
.desktop-view{display:block;}
.mobile-view{display:none;}
.mob-card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.07);margin-bottom:14px;}
.mob-card-header{background:linear-gradient(135deg,#2a1a3e,#1a1a2e);padding:16px 18px;display:flex;align-items:center;gap:14px;}
.mob-card-header .avatar,.mob-card-header .avatar-placeholder{width:54px;height:54px;font-size:18px;}
.mob-card-name{color:#fff;font-weight:800;font-size:15px;}
.mob-card-loc{color:rgba(255,255,255,0.5);font-size:12px;margin-top:2px;}
.mob-net{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #f5f5f5;font-size:13px;}
.mob-net:last-child{border-bottom:none;}

@media(max-width:680px){
  .page{margin:0;border-radius:0;padding:18px;}
  .desktop-view{display:none;}
  .mobile-view{display:block;}
  .filters-bar{flex-direction:column;}
  .filter-select,.filter-input{width:100%;min-width:auto;}
  .filter-seg-group{width:100%;}
  .filter-seg-input{flex:1;}
}
@media print{
  body{background:#fff;padding:0;}
  .page{box-shadow:none;margin:0;border-radius:0;padding:20px;}
  .filters-bar{display:none!important;}
  .mobile-view{display:none!important;}
  .desktop-view{display:block!important;}
  #loading-screen{display:none!important;}
  @page{margin:12mm;size:A4 landscape;}
}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="loader-logo">Be<strong>me</strong></div>
  <div class="loader-spinner"></div>
  <div class="loader-text" id="load-msg">Cargando roster...</div>
</div>

<div id="app" style="display:none">
  <div class="page">
    <div class="header">
      <div>
        <div class="logo">Be<strong>me</strong></div>
        <div class="roster-title" id="roster-title"></div>
        <div class="roster-desc" id="roster-desc"></div>
      </div>
      <div class="header-right">
        <div class="stat-line"><strong id="talent-count">0</strong> talentos</div>
        <div class="stat-line" id="date-line"></div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters-bar">
      <span class="filter-label">Filtrar:</span>
      <input type="text" class="filter-input" id="filter-search" placeholder="Buscar por nombre...">
      <select class="filter-select" id="filter-network">
        <option value="">Todas las redes</option>
        <option value="tiktok">TikTok</option>
        <option value="instagram">Instagram</option>
        <option value="youtube">YouTube</option>
      </select>
      <select class="filter-select" id="filter-country">
        <option value="">Todos los pa&iacute;ses</option>
      </select>
      <select class="filter-select" id="filter-gender">
        <option value="">Todos los g&eacute;neros</option>
        <option value="Femenino">Femenino</option>
        <option value="Masculino">Masculino</option>
        <option value="No binario">No binario</option>
      </select>
      <div class="filter-seg-group">
        <input type="number" class="filter-seg-input" id="filter-min-seg" placeholder="Min seg.">
        <span style="color:#aaa;">—</span>
        <input type="number" class="filter-seg-input" id="filter-max-seg" placeholder="Max seg.">
      </div>
      <button class="filter-clear" id="filter-clear-btn">Limpiar filtros</button>
    </div>

    <div class="count-bar">
      <span class="count-text" id="showing-count"></span>
    </div>

    <div id="content"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://ngstqwbzvnpggpklifat.supabase.co';
const SUPABASE_KEY = 'sb_publishable_1E2K-9D-KzOSVCgROnfa-g_-WCnWCDb';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const FLAG_MAP = {"Argentina":"\u{1F1E6}\u{1F1F7}","Bolivia":"\u{1F1E7}\u{1F1F4}","Brasil":"\u{1F1E7}\u{1F1F7}","Chile":"\u{1F1E8}\u{1F1F1}","Colombia":"\u{1F1E8}\u{1F1F4}","Costa Rica":"\u{1F1E8}\u{1F1F7}","Cuba":"\u{1F1E8}\u{1F1FA}","Ecuador":"\u{1F1EA}\u{1F1E8}","El Salvador":"\u{1F1F8}\u{1F1FB}","Espa\u00f1a":"\u{1F1EA}\u{1F1F8}","Estados Unidos":"\u{1F1FA}\u{1F1F8}","Guatemala":"\u{1F1EC}\u{1F1F9}","Honduras":"\u{1F1ED}\u{1F1F3}","M\u00e9xico":"\u{1F1F2}\u{1F1FD}","Nicaragua":"\u{1F1F3}\u{1F1EE}","Panam\u00e1":"\u{1F1F5}\u{1F1E6}","Paraguay":"\u{1F1F5}\u{1F1FE}","Per\u00fa":"\u{1F1F5}\u{1F1EA}","Puerto Rico":"\u{1F1F5}\u{1F1F7}","Rep\u00fablica Dominicana":"\u{1F1E9}\u{1F1F4}","Uruguay":"\u{1F1FA}\u{1F1FE}","Venezuela":"\u{1F1FB}\u{1F1EA}"};

let ROSTER = null;
let ALL_TALENTS = [];
let FILTERED = [];

function fmtF(n){if(!n||n===0)return'\u2014';if(n>=1e6)return(n/1e6).toFixed(1).replace('.0','')+'M';if(n>=1000)return Math.floor(n/1000)+'K';return String(n);}
function ini(name){return name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();}
function extractH(url){if(!url)return'';const m=url.match(/@([^/?#&]+)/);return m?'@'+m[1]:url.replace(/https?:\/\/(www\.)?[^/]+\//,'').split('/')[0];}
function safeUrl(url){if(!url)return'';return url.match(/^https?:\/\//)?url:'https://'+url;}

async function init() {
  const token = new URLSearchParams(window.location.search).get('token');
  if (!token) { showError('URL inv\u00e1lida \u2014 falta el token.'); return; }

  try {
    document.getElementById('load-msg').textContent = 'Cargando roster...';
    const { data: roster, error: rErr } = await sb.from('rosters_generales').select('*').eq('public_token', token).single();
    if (rErr || !roster) { showError('Roster no encontrado.'); return; }
    ROSTER = roster;
    document.title = roster.name + ' \u2014 Beme';

    document.getElementById('load-msg').textContent = 'Cargando talentos...';
    // Load all talents that match the roster's built-in filters
    let query = sb.from('talentos').select('id,nombre,foto,paises,ciudad,categorias,seguidores,genero,tiktok,instagram,youtube,keywords,valores,precio').order('nombre');
    const { data: talentsData } = await query;
    ALL_TALENTS = applyRosterFilters(talentsData || []);

    populateCountryFilter();
    applyUserFilters();
    setupFilterListeners();

    document.getElementById('roster-title').textContent = roster.name;
    document.getElementById('roster-desc').textContent = roster.description || '';
    const today = new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'long',year:'numeric'});
    document.getElementById('date-line').textContent = today;

    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  } catch(e) {
    showError('Error: ' + e.message);
  }
}

function showError(msg) {
  document.getElementById('load-msg').textContent = msg;
  document.querySelector('.loader-spinner').style.display = 'none';
}

// Apply the roster's built-in category/country/gender/followers filters
function applyRosterFilters(talents) {
  const f = ROSTER.filters || {};
  let result = [...talents].map(t => ({
    ...t,
    paises: t.paises || [],
    categorias: t.categorias || [],
    seguidores: t.seguidores || {tiktok:0,instagram:0,youtube:0},
  }));
  if (f.categoria) {
    result = result.filter(t => (t.categorias || []).includes(f.categoria));
  }
  if (f.pais) {
    result = result.filter(t => (t.paises || []).includes(f.pais));
  }
  if (f.genero) {
    result = result.filter(t => t.genero === f.genero);
  }
  if (f.min_seguidores > 0) {
    result = result.filter(t => {
      const total = (t.seguidores?.tiktok||0) + (t.seguidores?.instagram||0) + (t.seguidores?.youtube||0);
      return total >= f.min_seguidores;
    });
  }
  if (f.max_seguidores > 0) {
    result = result.filter(t => {
      const total = (t.seguidores?.tiktok||0) + (t.seguidores?.instagram||0) + (t.seguidores?.youtube||0);
      return total <= f.max_seguidores;
    });
  }
  return result;
}

function populateCountryFilter() {
  const countries = new Set();
  ALL_TALENTS.forEach(t => (t.paises||[]).forEach(p => countries.add(p)));
  const sel = document.getElementById('filter-country');
  [...countries].sort().forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = (FLAG_MAP[c]||'') + ' ' + c;
    sel.appendChild(opt);
  });
}

function applyUserFilters() {
  const search = (document.getElementById('filter-search').value || '').toLowerCase().trim();
  const network = document.getElementById('filter-network').value;
  const country = document.getElementById('filter-country').value;
  const gender = document.getElementById('filter-gender').value;
  const minSeg = parseInt(document.getElementById('filter-min-seg').value) || 0;
  const maxSeg = parseInt(document.getElementById('filter-max-seg').value) || 0;

  FILTERED = ALL_TALENTS.filter(t => {
    if (search && !t.nombre.toLowerCase().includes(search)) return false;
    if (network === 'tiktok' && !t.tiktok) return false;
    if (network === 'instagram' && !t.instagram) return false;
    if (network === 'youtube' && !t.youtube) return false;
    if (country && !(t.paises||[]).includes(country)) return false;
    if (gender && t.genero !== gender) return false;
    const total = (t.seguidores?.tiktok||0) + (t.seguidores?.instagram||0) + (t.seguidores?.youtube||0);
    if (minSeg > 0 && total < minSeg) return false;
    if (maxSeg > 0 && total > maxSeg) return false;
    return true;
  });

  document.getElementById('talent-count').textContent = FILTERED.length;
  document.getElementById('showing-count').textContent = FILTERED.length === ALL_TALENTS.length
    ? FILTERED.length + ' talentos'
    : 'Mostrando ' + FILTERED.length + ' de ' + ALL_TALENTS.length + ' talentos';
  render();
}

function setupFilterListeners() {
  let debounce = null;
  const run = () => { clearTimeout(debounce); debounce = setTimeout(applyUserFilters, 200); };
  document.getElementById('filter-search').addEventListener('input', run);
  document.getElementById('filter-network').addEventListener('change', applyUserFilters);
  document.getElementById('filter-country').addEventListener('change', applyUserFilters);
  document.getElementById('filter-gender').addEventListener('change', applyUserFilters);
  document.getElementById('filter-min-seg').addEventListener('input', run);
  document.getElementById('filter-max-seg').addEventListener('input', run);
  document.getElementById('filter-clear-btn').addEventListener('click', () => {
    document.getElementById('filter-search').value = '';
    document.getElementById('filter-network').value = '';
    document.getElementById('filter-country').value = '';
    document.getElementById('filter-gender').value = '';
    document.getElementById('filter-min-seg').value = '';
    document.getElementById('filter-max-seg').value = '';
    applyUserFilters();
  });
}

function render() {
  const showTT = ROSTER.platforms?.tt !== false;
  const showIG = ROSTER.platforms?.ig !== false;
  const showYT = ROSTER.platforms?.yt !== false;

  const ttSVG  = '<svg width="13" height="13" viewBox="0 0 24 24" fill="#ff0050"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34l-.04-8.68a8.25 8.25 0 004.82 1.55V4.72a4.85 4.85 0 01-1.01-.03z"/></svg>';
  const igSVG  = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#e1306c" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/></svg>';
  const ytSVG  = '<svg width="13" height="13" viewBox="0 0 24 24" fill="#ff0000"><path d="M23.5 6.19a3.02 3.02 0 0 0-2.12-2.14C19.54 3.5 12 3.5 12 3.5s-7.54 0-9.38.55A3.02 3.02 0 0 0 .5 6.19C0 8.04 0 12 0 12s0 3.96.5 5.81a3.02 3.02 0 0 0 2.12 2.14C4.46 20.5 12 20.5 12 20.5s7.54 0 9.38-.55a3.02 3.02 0 0 0 2.12-2.14C24 15.96 24 12 24 12s0-3.96-.5-5.81zM9.75 15.52V8.48L15.5 12l-5.75 3.52z"/></svg>';

  if (FILTERED.length === 0) {
    document.getElementById('content').innerHTML = '<div class="empty-msg">No se encontraron talentos con esos filtros.</div>';
    return;
  }

  // Desktop table
  const thStyle = '';
  const tableHeader = `<tr>
    <th>Talento</th><th>Pa\u00eds</th>
    ${showTT?'<th>TikTok</th>':''}
    ${showIG?'<th>Instagram</th>':''}
    ${showYT?'<th>YouTube</th>':''}
    <th>Categor\u00edas</th>
  </tr>`;

  const tableRows = FILTERED.map((t, i) => {
    const av = t.foto
      ? `<img src="${t.foto}" class="avatar">`
      : `<span class="avatar-placeholder">${ini(t.nombre)}</span>`;
    const ctries = (t.paises||[]).map(c=>(FLAG_MAP[c]||'')+' '+c).join('<br>');
    const ttCell = !showTT?'':t.tiktok?`<div class="net-link">${ttSVG}<a href="${safeUrl(t.tiktok)}" target="_blank" style="color:#ff0050;">${extractH(t.tiktok)}</a></div><div class="net-followers">${fmtF(t.seguidores?.tiktok)}</div>`:'<span style="color:#ccc;">\u2014</span>';
    const igCell = !showIG?'':t.instagram?`<div class="net-link">${igSVG}<a href="${safeUrl(t.instagram)}" target="_blank" style="color:#e1306c;">${extractH(t.instagram)}</a></div><div class="net-followers">${fmtF(t.seguidores?.instagram)}</div>`:'<span style="color:#ccc;">\u2014</span>';
    const ytCell = !showYT?'':t.youtube?`<div class="net-link">${ytSVG}<a href="${safeUrl(t.youtube)}" target="_blank" style="color:#cc0000;">${extractH(t.youtube)}</a></div><div class="net-followers">${fmtF(t.seguidores?.youtube)}</div>`:'<span style="color:#ccc;">\u2014</span>';
    const cats = (t.categorias||[]).slice(0,4).map(c=>`<span class="cat-tag">${c}</span>`).join('');
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:8px;">${av}<div><div class="talent-name">${t.nombre}</div>${t.ciudad?`<div class="talent-city">${t.ciudad}</div>`:''}</div></div></td>
      <td style="font-size:12px;color:#444;line-height:1.7;">${ctries}</td>
      ${showTT?`<td>${ttCell}</td>`:''}
      ${showIG?`<td>${igCell}</td>`:''}
      ${showYT?`<td>${ytCell}</td>`:''}
      <td><div style="display:flex;flex-wrap:wrap;gap:2px;">${cats}</div></td>
    </tr>`;
  }).join('');

  // Mobile cards
  const mobileCards = FILTERED.map(t => {
    const av = t.foto
      ? `<img src="${t.foto}" class="avatar" style="width:54px;height:54px;border:2px solid rgba(148,20,224,0.3);">`
      : `<div class="avatar-placeholder" style="width:54px;height:54px;font-size:18px;background:#e8d0f5;">${ini(t.nombre)}</div>`;
    const ctries = (t.paises||[]).map(c=>(FLAG_MAP[c]||'')+' '+c).join(' \u00b7 ');
    const nets = [
      showTT && t.tiktok ? `<div class="mob-net">${ttSVG}<a href="${safeUrl(t.tiktok)}" target="_blank" style="color:#ff0050;font-weight:700;flex:1;">${extractH(t.tiktok)}</a><span style="color:#333;font-weight:700;">${fmtF(t.seguidores?.tiktok)}</span></div>` : '',
      showIG && t.instagram ? `<div class="mob-net">${igSVG}<a href="${safeUrl(t.instagram)}" target="_blank" style="color:#e1306c;font-weight:700;flex:1;">${extractH(t.instagram)}</a><span style="color:#333;font-weight:700;">${fmtF(t.seguidores?.instagram)}</span></div>` : '',
      showYT && t.youtube ? `<div class="mob-net">${ytSVG}<a href="${safeUrl(t.youtube)}" target="_blank" style="color:#cc0000;font-weight:700;flex:1;">${extractH(t.youtube)}</a><span style="color:#333;font-weight:700;">${fmtF(t.seguidores?.youtube)}</span></div>` : '',
    ].filter(Boolean).join('');
    const cats = (t.categorias||[]).slice(0,4).map(c=>`<span class="cat-tag" style="font-size:11px;padding:3px 9px;">${c}</span>`).join(' ');
    return `<div class="mob-card">
      <div class="mob-card-header">${av}<div style="flex:1;min-width:0;">
        <div class="mob-card-name">${t.nombre}</div>
        <div class="mob-card-loc">${ctries}${t.ciudad?' \u00b7 '+t.ciudad:''}</div>
      </div></div>
      ${nets?`<div style="padding:0 18px;">${nets}</div>`:''}
      ${cats?`<div style="padding:10px 18px;border-top:1px solid #f5f5f5;display:flex;flex-wrap:wrap;gap:5px;">${cats}</div>`:''}
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="desktop-view"><div class="table-wrap">
      <table><thead>${tableHeader}</thead><tbody>${tableRows}</tbody></table>
    </div></div>
    <div class="mobile-view">${mobileCards}</div>`;
}

init();
