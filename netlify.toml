[build]
  environment = { NODE_VERSION = "18" }

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."contract-agent"]
  timeout = 26

[functions."roster-agent"]
  timeout = 30

[functions."campaign-summary"]
  timeout = 15
  schedule = "0 11 * * *"  # 5:00 AM Mexico City (UTC-6)

[functions."campaign-notifications"]
  timeout = 20
  schedule = "0 12 * * *"  # 6:00 AM Mexico City — daily pending reminders

# Cache strategy
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
