[functions]
  directory = "netlify/functions"

# Redirects for single-page app behavior
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache strategy
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
